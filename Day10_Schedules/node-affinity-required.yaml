apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: webapp
    type: front-end

spec:
  replicas: 3

  selector:
    matchLabels:
      app: webapp
      type: front-end

  template:
    metadata:
      labels:
        app: webapp
        type: front-end

    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: clr
                    operator: In
                    values:
                      - white
                      - green

      containers:
        - name: nginx
          image: nginx:latest